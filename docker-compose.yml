services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=iot_service
      - RABBITMQ_DEFAULT_PASS=iot_secret
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  python-service:
    image: hiphophippo/iot-python-service:a1
    build:
      context: ./python-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/app/data/sensors-python.db
      - API_TOKEN=${API_TOKEN:-your-secret-token}
      - SEED_DATA_PATH=/app/data/sensors.json
      - RABBITMQ_URL=amqp://iot_service:iot_secret@rabbitmq:5672/
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; req = urllib.request.Request('http://localhost:8000/health', headers={'Authorization': 'Bearer ${API_TOKEN:-your-secret-token}'}); urllib.request.urlopen(req, timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  go-service:
    image: hiphophippo/iot-go-service:a1
    build:
      context: ./go-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - GIN_MODE=release
      - DATABASE_PATH=/app/data/sensors-go.db
      - API_TOKEN=${API_TOKEN:-your-secret-token}
      - SEED_DATA_PATH=/app/data/sensors.json
      - RABBITMQ_URL=amqp://iot_service:iot_secret@rabbitmq:5672/
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--header", "Authorization: Bearer ${API_TOKEN:-your-secret-token}", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  go-alert-service:
    build:
      context: ./go-alert-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
    environment:
      - GIN_MODE=release
      - PORT=8081
      - DATABASE_PATH=/app/data/alerts-go.db
      - API_TOKEN=${API_TOKEN:-your-secret-token}
      - SEED_DATA_PATH=/app/data/alert_rules.json
      - SENSOR_SERVICE_URL=http://go-service:8080
      - RABBITMQ_URL=amqp://iot_service:iot_secret@rabbitmq:5672/
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - CB_FAIL_MAX=5
      - CB_RESET_TIMEOUT=30
    depends_on:
      rabbitmq:
        condition: service_healthy
      go-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--header", "Authorization: Bearer ${API_TOKEN:-your-secret-token}", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  python-alert-service:
    build:
      context: ./python-alert-service
      dockerfile: Dockerfile
    ports:
      - "8002:8001"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/app/data/alerts-python.db
      - API_TOKEN=${API_TOKEN:-your-secret-token}
      - SEED_DATA_PATH=/app/data/alert_rules.json
      - SENSOR_SERVICE_URL=http://python-service:8000
      - RABBITMQ_URL=amqp://iot_service:iot_secret@rabbitmq:5672/
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - CB_FAIL_MAX=5
      - CB_RESET_TIMEOUT=30
    depends_on:
      rabbitmq:
        condition: service_healthy
      python-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
